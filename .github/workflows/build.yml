name: Android Build CI

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  build:
    name: Build Android App & Generate APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'

      - name: Configure Environment and Keystore
        run: |
          # Create placeholder .env so the secrets gradle plugin resolves correctly
          touch .env
          
          # Reconstitute debug keystore for signed debug compilation
          if [ -f debug.keystore.base64 ]; then
            echo "Successfully found debug.keystore.base64. Decoding..."
            base64 -d debug.keystore.base64 > debug.keystore
          else
            echo "debug.keystore.base64 not found. Creating a fresh, standard debug.keystore using keytool..."
            keytool -genkeypair -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Build Debug APK
        run: gradle :app:assembleDebug --stacktrace --no-daemon

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NetBlock-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14
